name: Build PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          path: source
          fetch-depth: 0

      - name: Restore HTML source files
        # The html/ files were accidentally emptied. Restore them from the last
        # good commit (e5d18c2) which had the correct content-page structure.
        # build.py strips content-page wrappers at render time, so the source
        # stays as original and the transformation happens in-memory.
        run: |
          cd source
          git checkout e5d18c21008ce25f60b7f6cd4c8da85effd6bd7c -- html/
          echo "HTML files restored:"
          ls -la html/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install weasyprint beautifulsoup4

      - name: Build PDF
        run: |
          cd source
          mkdir -p output
          python build.py

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Copy PDF to gh-pages
        run: cp source/output/the-thread.pdf pages/the-thread.pdf

      - name: Write download page
        run: |
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <title>Download - The Thread</title>
          <style>
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:Arial,sans-serif;background:#f0f0f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
          .card{background:white;border-radius:10px;padding:52px 60px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:500px;width:100%}
          .label{font-size:11px;letter-spacing:3px;color:#aaa;text-transform:uppercase;font-weight:700;margin-bottom:10px}
          h1{font-family:'Arial Black',Arial,sans-serif;font-size:52px;font-weight:900;color:#111;letter-spacing:-2px;line-height:1;margin-bottom:4px}
          .the{font-family:Georgia,serif;font-style:italic;font-size:22px;color:#999;display:block;margin-bottom:2px}
          .subtitle{font-family:Georgia,serif;font-style:italic;font-size:13.5px;color:#999;line-height:1.5;margin:12px 0 6px}
          .meta{font-size:11.5px;color:#ccc;margin-bottom:32px}
          .btn{display:inline-block;background:#C0392B;color:white;text-decoration:none;padding:15px 40px;border-radius:6px;font-weight:700;font-size:15px}
          .btn:hover{background:#a93226}
          .filemeta{margin-top:14px;font-size:11px;color:#ddd}
          </style>
          </head>
          <body>
          <div class="div">
            <div style="margin-bottom:24px">
              <svg xmlns="http://www.w3.org/2000/svg" width="300" height="100" viewBox="0 0 300 100">
                <polyline points="15,85 30,60 65,40 110,30 190,30 235,40 270,60 285,85" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="M 285,85 Q 150,112 15,85" fill="none" stroke="#C0392B" stroke-width="2"/>
                <circle cx="15" cy="85" r="5" fill="#C0392B"/><circle cx="30" cy="60" r="5" fill="#C0392B"/>
                <circle cx="65" cy="40" r="5" fill="#C0392B"/><circle cx="110" cy="30" r="5" fill="#C0392B"/>
                <circle cx="190" cy="30" r="5" fill="#C0392B"/><circle cx="235" cy="40" r="5" fill="#C0392B"/>
                <circle cx="270" cy="60" r="5" fill="#C0392B"/><circle cx="285" cy="85" r="5" fill="#C0392B"/>
              </svg>
            </div>
            <div class="label">Phase I - Textbook</div>
            <span class="the">The</span>
            <h1>THREAD</h1>
            <p class="subtitle">Customer Sales Data: A Practical Guide<br>to Building and Using Sales Intelligence</p>
            <p class="meta">Tier I–IV · 10 Chapters</p>
            <a class="btn" href="the-thread.pdf" download="the-thread.pdf">Download PDF</a>
          </div>
          </body>
          </html>
          EOF

      - name: Commit and push
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add the-thread.pdf index.html
          git diff --cached --quiet || git commit -m "Build: update the-thread.pdf"
          git push
